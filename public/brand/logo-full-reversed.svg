<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 96">
  <!-- White background -->
  <rect width="400" height="96" fill="#FFFFFF"/>

  <!--
    Icon mark — same 72×72 as logo-full, but displayed as a navy badge on white.
    The navy rect (rx=12 after scale) provides the icon's background.
  -->
  <g transform="translate(12,12) scale(0.75)">
    <!-- Navy badge background for icon -->
    <rect width="96" height="96" rx="16" fill="#1A3A5C"/>
    <circle cx="48" cy="48" r="30" fill="#C9A227"/>
    <polygon
      points="48,36 59.4,44.3 55.1,57.7 40.9,57.7 36.6,44.3"
      fill="none" stroke="#1A3A5C" stroke-width="2.5" stroke-linejoin="round"/>
    <line x1="48"   y1="36"   x2="48"   y2="18"   stroke="#1A3A5C" stroke-width="2.5"/>
    <line x1="59.4" y1="44.3" x2="76.5" y2="38.7" stroke="#1A3A5C" stroke-width="2.5"/>
    <line x1="55.1" y1="57.7" x2="65.6" y2="72.3" stroke="#1A3A5C" stroke-width="2.5"/>
    <line x1="40.9" y1="57.7" x2="30.4" y2="72.3" stroke="#1A3A5C" stroke-width="2.5"/>
    <line x1="36.6" y1="44.3" x2="19.5" y2="38.7" stroke="#1A3A5C" stroke-width="2.5"/>
    <path
      d="M 5 48 H 28 L 34 40 L 39 60 L 47 6 L 53 48 H 91"
      stroke="#FFFFFF" stroke-width="5.5" fill="none"
      stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Thin vertical separator -->
  <line x1="96" y1="20" x2="96" y2="76" stroke="#1A3A5C" stroke-width="1" stroke-opacity="0.2"/>

  <!-- Wordmark: "Player" navy  +  "Pulse" gold -->
  <text
    x="110" y="61"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="36" font-weight="700" letter-spacing="-0.5">
    <tspan fill="#1A3A5C">Player</tspan><tspan fill="#C9A227">Pulse</tspan>
  </text>
</svg>
