<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- FuseID favicon: stylized F mark on deep navy background -->
  <rect width="32" height="32" rx="6" fill="#0F1120"/>
  <!-- Top-left circuit node -->
  <circle cx="8" cy="9" r="2" fill="#4ADE80"/>
  <!-- Bottom-left circuit node -->
  <circle cx="8" cy="24" r="2" fill="#4ADE80"/>
  <!-- Vertical stem connecting nodes -->
  <rect x="6.5" y="9" width="3" height="15" fill="#4ADE80"/>
  <!-- Top horizontal bar of the F -->
  <rect x="8" y="7.5" width="17" height="3" fill="#4ADE80"/>
  <!-- Lightning-bolt middle bar (angled, thinner — echoes the F icon in the wordmark) -->
  <path d="M 9 14 L 18 14 L 14 18 L 22 18 L 9 18 Z" fill="#4ADE80"/>
</svg>
